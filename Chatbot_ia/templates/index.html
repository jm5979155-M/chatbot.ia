<!DOCTYPE html>
<html lang="es">

<head>

    <title>Chatbot IA</title>

          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

        <h1>🤖 Chatbot IA</h1>

        </div>

    </div>

    <script
        src="{{ url_for('static', filename='script.js') }}">
    </script>

</body>
</html>
